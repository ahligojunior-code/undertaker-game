<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNDERTAKER - Jeu en Ligne</title>
  <style>
    :root {
      --bg-color: #0d0d13;
      --panel-color: #1a1a24;
      --accent-color: #ff69b4; /* Rose Éclatant */
      --gold-color: #d4af37; /* Or Luxueux */
      --text-color: #ffffff;
      --text-muted: #a0a0b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--panel-color);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0,5);
      border: 1px solid rgba(255, 105, 180, 0.15);
      padding: 24px;
      position: relative;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    h1, h2, h3 { color: var(--gold-color); text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
    
    /* Formulaires & Boutons */
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; }
    input[type="text"] {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
      background: #252533; color: white; font-size: 16px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent-color); }
    
    .btn {
      display: inline-block; width: 100%; padding: 14px; background: var(--accent-color);
      color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
      font-size: 16px; text-transform: uppercase; transition: all 0.2s ease; margin-top: 8px;
    }
    .btn:hover { background: #ff4da6; transform: translateY(-1px); }
    .btn-secondary { background: #3a3a4f; margin-top: 12px; }
    .btn-secondary:hover { background: #4a4a64; }

    /* Options / Toggles */
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
    .option-item {
      background: #252533; padding: 12px; border-radius: 8px; display: flex;
      align-items: center; justify-content: space-between; border: 1px solid #333;
    }
    .option-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-color); }

    /* Liste des joueurs */
    .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
    .player-badge {
      background: #252533; padding: 10px; border-radius: 8px; text-align: center;
      border: 1px solid #333; font-size: 14px; position: relative;
    }
    .player-badge.dead { opacity: 0.4; text-decoration: line-through; border-color: #ff4444; }
    .player-badge.host::after { content: "👑"; position: absolute; top: -5px; right: -5px; font-size: 12px; }

    /* Rôle & Mot */
    .word-card {
      background: linear-gradient(135deg, #252533 0%, #1a1a24 100%);
      padding: 20px; border-radius: 12px; text-align: center; margin: 20px 0;
      border: 2px dashed var(--gold-color);
    }
    .secret-word { font-size: 28px; font-weight: bold; color: var(--accent-color); margin-top: 10px; letter-spacing: 1px; }

    /* Chat interactif */
    .chat-container { border: 1px solid #333; border-radius: 8px; background: #151520; margin-top: 20px; }
    .chat-messages { height: 180px; overflow-y: auto; padding: 12px; font-size: 14px; display: flex; flex-direction: column; gap: 6px; }
    .chat-input-area { display: flex; border-top: 1px solid #333; }
    .chat-input-area input { flex: 1; padding: 12px; background: transparent; border: none; color: white; outline: none; }
    .chat-input-area button { padding: 0 20px; background: var(--gold-color); border: none; color: black; font-weight: bold; cursor: pointer; }

    /* Ordre de parole */
    .speaker-box { background: #2b1b2c; border: 1px solid var(--accent-color); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; }

    /* Toast Notification */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.9); border: 1px solid var(--accent-color);
      padding: 12px 24px; border-radius: 30px; z-index: 1000; display: none; color: white;
    }
  </style>
</head>
<body>

  <div id="toast" class="toast"></div>

  <div class="container">
    
    <!-- 1. ACCUEIL (CONNEXION) -->
    <div id="screen-auth" class="screen active">
      <h1>Undertaker</h1>
      <div class="form-group">
        <label for="username">Votre Pseudo</label>
        <input type="text" id="username" placeholder="Ex: Lucas" autocomplete="off">
      </div>
      <button class="btn" id="btn-create">Créer un Salon</button>
      
      <div style="margin: 20px 0; text-align: center; color: var(--text-muted);">— OU —</div>
      
      <div class="form-group">
        <label for="room-code">Code du Salon</label>
        <input type="text" id="room-code" placeholder="Ex: AX7E" autocomplete="off">
      </div>
      <button class="btn btn-secondary" id="btn-join">Rejoindre</button>
    </div>

    <!-- 2. LOBBY (ATTENTE) -->
    <div id="screen-lobby" class="screen">
      <h2>Salon : <span id="display-room-code" style="color: var(--accent-color);"></span></h2>
      <p style="text-align: center; color: var(--text-muted);">Joueurs connectés :</p>
      <div id="lobby-players" class="player-list"></div>
      
      <!-- Options du Host -->
      <div id="host-options-panel" style="display: none;">
        <h3>Options de jeu</h3>
        <div class="options-grid">
          <div class="option-item"><label>Mot Interdit</label><input type="checkbox" id="opt-interdit"></div>
          <div class="option-item"><label>Mode Bavard</label><input type="checkbox" id="opt-bavard"></div>
          <div class="option-item"><label>Mode Muet</label><input type="checkbox" id="opt-muet"></div>
          <div class="option-item"><label>L'Oracle</label><input type="checkbox" id="opt-oracle"></div>
          <div class="option-item"><label>Le Chasseur</label><input type="checkbox" id="opt-hunter"></div>
        </div>
        <button class="btn" id="btn-start">Lancer la Partie</button>
      </div>
      <p id="wait-message" style="text-align: center; color: var(--text-muted); margin-top: 15px;">En attente de l'hôte...</p>
    </div>

    <!-- 3. EN JEU -->
    <div id="screen-game" class="screen">
      <div class="speaker-box" id="speaker-box">C'est au tour de : <strong id="current-speaker">-</strong></div>
      
      <div class="word-card">
        <div id="role-title" style="font-weight: bold; color: var(--text-muted);">Votre Rôle</div>
        <div id="secret-word" class="secret-word">???</div>
      </div>

      <div id="modifier-alerts" style="margin: 10px 0; text-align: center; font-size: 14px; color: var(--gold-color);"></div>

      <!-- Zone d'action dynamique (Votes / Devine / Tirs) -->
      <div id="action-zone" style="margin-top: 20px;"></div>

      <!-- Chat Public Intégré -->
      <div class="chat-container">
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Discutez ou donnez votre indice ici..." autocomplete="off">
          <button id="btn-send-chat">Envoyer</button>
        </div>
      </div>
      
      <button class="btn btn-secondary" id="btn-trigger-vote" style="display: none;">Passer au Vote Général</button>
    </div>

    <!-- 4. FIN DE PARTIE -->
    <div id="screen-end" class="screen">
      <h2>Fin de la Partie</h2>
      <h3 id="end-title" style="color: var(--accent-color);"></h3>
      <p id="end-desc" style="text-align: center; margin-bottom: 20px; color: var(--text-muted);"></p>
      
      <div id="end-summary" class="player-list"></div>
      
      <button class="btn" id="btn-restart">Retour au Lobby</button>
    </div>

  </div>

  <!-- Intégration de Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let currentRoom = '';
    let amIHost = false;
    let myId = '';

    // Éléments UI
    const screens = {
      auth: document.getElementById('screen-auth'),
      lobby: document.getElementById('screen-lobby'),
      game: document.getElementById('screen-game'),
      end: document.getElementById('screen-end')
    };

    function changeScreen(screenKey) {
      Object.keys(screens).forEach(k => screens[k].classList.remove('active'));
      screens[screenKey].classList.add('active');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 4000);
    }

    // --- ENVOIS EVENEMENTS ---
    document.getElementById('btn-create').onclick = () => {
      const username = document.getElementById('username').value.trim();
      if(!username) return showToast("Veuillez entrer un pseudo.");
      socket.emit('createRoom', { username });
    };

    document.getElementById('btn-join').onclick = () => {
      const username = document.getElementById('username').value.trim();
      const roomCode = document.getElementById('room-code').value.trim();
      if(!username || !roomCode) return showToast("Remplissez tous les champs.");
      socket.emit('joinRoom', { roomCode, username });
    };

    document.getElementById('btn-start').onclick = () => {
      const opts = {
        interdit: document.getElementById('opt-interdit').checked,
        bavard: document.getElementById('opt-bavard').checked,
        muet: document.getElementById('opt-muet').checked,
        oracle: document.getElementById('opt-oracle').checked,
        hunter: document.getElementById('opt-hunter').checked
      };
      socket.emit('startGame', { roomCode: currentRoom, opts });
    };

    document.getElementById('btn-trigger-vote').onclick = () => {
      socket.emit('startVotingPhase', currentRoom);
    };

    // Chat
    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      if(!input.value.trim()) return;
      socket.emit('sendMessage', { roomCode: currentRoom, message: input.value });
      input.value = '';
    }
    document.getElementById('btn-send-chat').onclick = sendChatMessage;
    document.getElementById('chat-input').onkeypress = (e) => { if(e.key === 'Enter') sendChatMessage(); };

    document.getElementById('btn-restart').onclick = () => {
      location.reload(); // Solution simple et robuste pour réinitialiser le client
    };

    // --- RECEPTION EVENEMENTS SOCKET ---
    socket.on('connect', () => { myId = socket.id; });
    socket.on('errorMsg', (msg) => showToast(msg));

    socket.on('joinSuccess', ({ roomCode, isHost }) => {
      currentRoom = roomCode;
      amIHost = isHost;
      document.getElementById('display-room-code').innerText = roomCode;
      
      if(isHost) {
        document.getElementById('host-options-panel').style.display = 'block';
        document.getElementById('wait-message').style.display = 'none';
        document.getElementById('btn-trigger-vote').style.display = 'block';
      }
      changeScreen('lobby');
    });

    socket.on('roomUpdated', ({ players }) => {
      const container = document.getElementById('lobby-players');
      container.innerHTML = '';
      players.forEach(p => {
        const badge = document.createElement('div');
        badge.className = `player-badge ${p.isHost ? 'host' : ''}`;
        badge.innerText = p.username;
        container.appendChild(badge);
      });
    });

    socket.on('gameStarted', (data) => {
      changeScreen('game');
      document.getElementById('chat-messages').innerHTML = ''; // Clear chat précédent
      document.getElementById('role-title').innerText = `Votre Rôle : ${data.role.toUpperCase()}`;
      document.getElementById('secret-word').innerText = data.word;

      let alertText = '';
      if (data.isBavard) alertText += `💬 Tu es le Bavard ! Place le mot "${data.bavWord}" en toute discrétion. `;
      if (data.opts.interdit) alertText += `🚫 Le mot interdit global est : "${data.interditWord}". `;
      if (data.muetActive) alertText += `🤫 Tour Muet en cours : Interdit de parler avec la voix, utilisez le chat !`;
      document.getElementById('modifier-alerts').innerText = alertText;

      updateSpeechUI(data.speechOrder);
      document.getElementById('action-zone').innerHTML = `<p style="text-align:center;color:var(--text-muted);">Décrivez votre mot à tour de rôle...</p>`;
    });

    socket.on('receiveMessage', ({ username, message, alive, role }) => {
      const box = document.getElementById('chat-messages');
      const msgEl = document.createElement('div');
      let roleTag = role ? ` [${role.toUpperCase()}]` : '';
      msgEl.innerHTML = `<strong style="color:var(--accent-color);">${username}${roleTag} :</strong> ${message}`;
      if(!alive) msgEl.style.opacity = '0.5';
      box.appendChild(msgEl);
      box.scrollTop = box.scrollHeight;
    });

    socket.on('nextRound', ({ speechOrder }) => {
      updateSpeechUI(speechOrder);
      showToast("Nouveau tour de table !");
    });

    socket.on('votingPhase', ({ players }) => {
      showToast("Phase de vote commencée ! Éliminez un suspect.");
      const zone = document.getElementById('action-zone');
      zone.innerHTML = `<h3>Qui est l'intrus ? Votez :</h3>`;
      
      const grid = document.createElement('div');
      grid.className = 'player-list';

      players.forEach(p => {
        if(p.id === myId) return; // Ne pas voter pour soi-même
        const btnVote = document.createElement('button');
        btnVote.className = 'btn btn-secondary';
        btnVote.style.marginTop = '0';
        btnVote.innerText = p.username;
        btnVote.onclick = () => {
          socket.emit('submitVote', { roomCode: currentRoom, targetId: p.id });
          zone.innerHTML = `<p style="text-align:center;color:var(--gold-color);">Vote enregistré. En attente des autres joueurs...</p>`;
        };
        grid.appendChild(btnVote);
      });
      zone.appendChild(grid);
    });

    socket.on('playerEliminated', ({ username, role }) => {
      showToast(`📢 ${username} a été éliminé par le tribunal ! Son rôle était : ${role.toUpperCase()}`);
    });

    socket.on('toastMsg', (msg) => showToast(msg));

    // Scénario Spécifique : Mr White doit deviner
    socket.on('whiteGuessPhase', ({ whiteName, whiteId }) => {
      const zone = document.getElementById('action-zone');
      if(myId === whiteId) {
        zone.innerHTML = `
          <h3>🕵️ Devine le mot des Civils</h3>
          <p style="margin-bottom:10px;">Tu as été démasqué mais tu peux encore gagner en devinant leur mot exact :</p>
          <input type="text" id="white-guess-input" placeholder="Votre mot..." style="width:70%; padding:10px; border-radius:8px; border:none;">
          <button class="btn" id="btn-submit-white" style="width:25%; margin-left:5px; padding:10px;">Valider</button>
        `;
        document.getElementById('btn-submit-white').onclick = () => {
          const g = document.getElementById('white-guess-input').value;
          socket.emit('submitWhiteGuess', { roomCode: currentRoom, guess: g });
        };
      } else {
        zone.innerHTML = `<p style="text-align:center;color:var(--gold-color);">🕵️ Mr White (${whiteName}) tente de pirater le mot secret des civils...</p>`;
      }
    });

    // Scénario Spécifique : Tir du Chasseur
    socket.on('hunterShotPhase', ({ hunterId, hunterName, targets }) => {
      const zone = document.getElementById('action-zone');
      if(myId === hunterId) {
        zone.innerHTML = `<h3>🎯 Tir de Vengeance du Chasseur !</h3><p>Élimine la cible de ton choix immédiatement :</p>`;
        const grid = document.createElement('div');
        grid.className = 'player-list';
        targets.forEach(t => {
          const b = document.createElement('button');
          b.className = 'btn';
          b.style.background = '#ff4444';
          b.innerText = t.username;
          b.onclick = () => {
            socket.emit('submitHunterShot', { roomCode: currentRoom, targetId: t.id });
          };
          grid.appendChild(b);
        });
        zone.appendChild(grid);
      } else {
        zone.innerHTML = `<p style="text-align:center;color:#ff4444;">🎯 Le Chasseur (${hunterName}) arme son fusil pour une dernière riposte...</p>`;
      }
    });

    socket.on('gameOver', ({ winner, desc, allPlayers, wordA, wordB }) => {
      changeScreen('end');
      document.getElementById('end-title').innerText = winner === 'civils' ? "Victoire des Civils ! 🍏" : "Victoire des Intrus ! 🦊";
      document.getElementById('end-desc').innerHTML = `${desc}<br><br><strong>Mot Civil (A) :</strong> ${wordA} | <strong>Mot Under (B) :</strong> ${wordB}`;
      
      const summary = document.getElementById('end-summary');
      summary.innerHTML = '';
      allPlayers.forEach(p => {
        const item = document.createElement('div');
        item.className = `player-badge`;
        item.innerHTML = `<strong>${p.username}</strong><br><span style="color:var(--accent-color); font-size:12px;">${p.role.toUpperCase()}</span>`;
        summary.appendChild(item);
      });
    });

    function updateSpeechUI(order) {
      if(!order || order.length === 0) return;
      const names = order.map(p => p.username).join(' ➡️ ');
      document.getElementById('current-speaker').innerText = names;
    }
  </script>
</body>
</html>
